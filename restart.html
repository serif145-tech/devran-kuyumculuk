<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080d0c">
  <title>Devran Kuyumculuk</title>
  <style>
    html,body{height:100%;margin:0;background:#080d0c;color:#e8c86a;font-family:system-ui,-apple-system,sans-serif}
    body{display:grid;place-items:center;text-align:center}.mark{font-size:42px;filter:drop-shadow(0 0 18px #d9aa36)}
    p{margin:14px 0 0;font-size:15px;font-weight:700}
  </style>

<body>
  <main><div class="mark">◆</div><p>Mikrofon yeniden başlatılıyor...</p></main>
  <script>
    try { speechSynthesis.cancel(); } catch {}
    setTimeout(() => location.replace('./?micRestarted=' + Date.now()), 900);
  </script>
